name: CI/CD Pipeline

on:
  push:
    branches: [main, master]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python3 model/train.py

      - name: Start API
        run: |
          uvicorn app.main:app --port 8000 &
          sleep 5

      - name: Test health endpoint
        run: |
          curl -f http://localhost:8000/health

      - name: Test prediction endpoint
        run: |
          curl -f -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"features": [0.1,0.5,-0.3,1.2,0.8,-0.5,0.3,-1.1,0.6,0.2]}'

      - name: Build Docker image
        run: docker build -t fraud-detection-api .

      - name: Success
        run: echo "✅ All tests passed! Docker image built successfully."
