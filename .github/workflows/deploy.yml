name: CI/CD Pipeline

on:
  push:
    branches: [main, master]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python3 model/train.py

      - name: Start API
        run: |
          uvicorn app.main:app --port 8000 &
          sleep 5

      - name: Test health endpoint
        run: curl -f http://localhost:8000/health

      - name: Test prediction with real inputs
        run: |
          curl -f -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{
              "amount": 85000,
              "time_of_day": 2,
              "distance_from_home_km": 300,
              "transactions_today": 7
            }'

      - name: Build Docker image
        run: docker build -t fraud-detection-api .

      - name: Success
        run: echo "✅ All tests passed!"