name: CI/CD Pipeline

# Trigger on:
#   push to main   → full pipeline (lint + test + build)
#   pull_request   → lint + test only (the PR gate)
#     This means broken code is caught BEFORE it merges to main,
#     not after. Main branch stays always-deployable.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Minimal token permissions — principle of least privilege in CI
permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Lint
  # Runs first — fast feedback (seconds, not minutes)
  # If code style is broken, no point running tests
  # -----------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Cache pip downloads — avoids re-downloading on every run
      # Cache key includes the requirements hash so it invalidates when deps change
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-dev-${{ hashFiles('requirements-dev.txt') }}

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff linter
        run: ruff check app/ tests/

  # -----------------------------------------------------------------------
  # Job 2: Test
  # Runs after lint passes — runs all pytest tests
  # Uses needs: lint so tests only run if linting passed
  # -----------------------------------------------------------------------
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint        # don't run tests if linting failed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Separate cache key for prod + dev deps together
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-all-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}

      - name: Install all dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Train model
        # Model file is gitignored (binary), so we train it fresh in CI
        # This also tests that the training script itself doesn't crash
        run: python model/train.py

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  # -----------------------------------------------------------------------
  # Job 3: Build Docker image
  # Only runs on push to main (not on PRs) — no point building on every PR
  # Only runs if tests passed
  # -----------------------------------------------------------------------
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test                          # only build if tests passed
    if: github.event_name == 'push'     # only on push to main, not PRs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fraud-detection-api:${{ github.sha }} .

      - name: Confirm image was built
        run: docker images fraud-detection-api